services:
  goalscout:
    build: .
    container_name: goalscout
    ports:
      - "3030:3030"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - PORT=3030
      - FLARESOLVERR_URL=http://192.168.178.5:8191/v1
      - DISPLAY_TIMEZONE=Australia/Melbourne
      # Keys 63e840... and 30786... were exhausted — removed.
      # Remaining: 30d4b1... (~325 remaining) and 70b380... (~292 remaining)
      - ODDS_API_KEYS=30d4b173a6bab1a9a6b9d0f8999ae00b,70b3804507b7a046ef41606d77b3bde3
      # UK only — Bet365, Pinnacle, William Hill, Betfair Exchange etc.
      - ODDS_REGIONS=uk
      # No bookmaker allowlist — best price wins across all UK books.
      - ODDS_BOOKMAKERS=
      # Daily quota guard — 2 keys × 500/month ≈ 33/day. 25 is safe.
      - ODDS_DAILY_LIMIT=25
      - SOCCERSTATS_COOKIE=ASPSESSIONIDAGASBTAA=AFCKGEGAJCONMCJLJDOHLECB; steady-token=anZiWFBGaDBrbzNKRkQ4US83VkdVQT09; mmode=1; dmmode=1; tz=600
    extra_hosts:
      - "binhex-flaresolverr:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/api/status"]
      interval: 60s
      timeout: 5s
      start_period: 30s