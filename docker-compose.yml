services:
  goalscout:
    build: .
    container_name: goalscout
    ports:
      - "3030:3030"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - PORT=3030
      - FLARESOLVERR_URL=http://192.168.178.5:8191/v1
      - DISPLAY_TIMEZONE=Australia/Melbourne
      # Active Odds API keys (3 remaining after exhausted keys removed)
      - ODDS_API_KEYS=8eef29d836813cf5b5c949ae74aab60f
      # UK only — Bet365, Pinnacle, William Hill, Betfair Exchange etc.
      - ODDS_REGIONS=au,uk
      # No bookmaker allowlist — best price wins across all UK books.
      - ODDS_BOOKMAKERS=
      # Daily quota guard — 3 keys × ~400 remaining ≈ 25/day safe
      - ODDS_DAILY_LIMIT=600
      # Football-Data.org free key — used for reliable results settlement
      # Covers: EPL, Bundesliga, Serie A, Ligue 1, La Liga, Eredivisie,
      # Champions League, Championship, Liga Portugal, Brasileirão
      - FOOTBALL_DATA_API_KEY=a9d0e1a3751a4eb9bdbee67a603ba0e0
      - SOCCERSTATS_COOKIE=ASPSESSIONIDAGASBTAA=AFCKGEGAJCONMCJLJDOHLECB; steady-token=anZiWFBGaDBrbzNKRkQ4US83VkdVQT09; mmode=1; dmmode=1; tz=600
    extra_hosts:
      - "binhex-flaresolverr:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3030/api/status"]
      interval: 60s
      timeout: 5s
      start_period: 30s